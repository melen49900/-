<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Count of Shimajirou</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', sans-serif; background: #fff; color: #1a1a1a; min-height: 100vh; }
  .app { max-width: 640px; margin: 0 auto; padding: 2rem 1.25rem 3rem; }
  .header { text-align: center; margin-bottom: 2.5rem; }
  .header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #888; margin-bottom: 0.75rem; }
  .counter-display { font-family: 'DM Mono', monospace; font-size: 96px; font-weight: 500; line-height: 1; color: #1a1a1a; letter-spacing: -3px; transition: transform 0.15s ease; }
  .counter-display.bump { transform: scale(1.06); }
  .status-label { font-size: 12px; color: #aaa; margin-top: 0.6rem; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }
  .status-dot.offline { background: #E24B4A; }
  .selector-row { display: flex; gap: 10px; align-items: center; margin-bottom: 1.5rem; }
  .selector-row label { font-size: 13px; color: #666; white-space: nowrap; }
  .selector-row select { flex: 1; font-family: 'Syne', sans-serif; font-size: 14px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; cursor: pointer; }
  .btn-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 0.75rem; }
  .btn-plus, .btn-minus { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; padding: 10px 4px; border-radius: 8px; cursor: pointer; transition: transform 0.1s, background 0.15s, color 0.15s; border: 1px solid #ddd; background: #fff; color: #1a1a1a; }
  .btn-plus:hover { background: #EAF3DE; color: #3B6D11; border-color: #97C459; }
  .btn-minus:hover { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
  .btn-plus:active, .btn-minus:active { transform: scale(0.93); }
  .note-row { display: flex; gap: 10px; align-items: center; margin-bottom: 1.5rem; }
  .note-row label { font-size: 13px; color: #666; white-space: nowrap; }
  .note-row input { flex: 1; font-family: 'Syne', sans-serif; font-size: 13px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; color: #1a1a1a; outline: none; }
  .note-row input:focus { border-color: #aaa; }
  .divider { border: none; border-top: 1px solid #f0f0f0; margin: 1.5rem 0; }
  .log-section { margin-top: 0.5rem; }
  .log-title { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #bbb; margin-bottom: 0.75rem; }
  .log-list { display: flex; flex-direction: column; gap: 4px; }
  .log-item { display: grid; grid-template-columns: auto auto 1fr auto; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; background: #f8f8f8; font-size: 13px; }
  .log-name { color: #555; font-weight: 600; white-space: nowrap; }
  .log-delta-pos { color: #1D9E75; font-family: 'DM Mono', monospace; white-space: nowrap; }
  .log-delta-neg { color: #E24B4A; font-family: 'DM Mono', monospace; white-space: nowrap; }
  .log-note { color: #aaa; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .log-time { color: #bbb; font-size: 11px; font-family: 'DM Mono', monospace; white-space: nowrap; }
  .empty-log { text-align: center; color: #ccc; font-size: 13px; padding: 2rem 0; }
  .admin-toggle { text-align: center; margin-top: 1rem; }
  .admin-link { font-size: 11px; color: #ccc; cursor: pointer; background: none; border: none; text-decoration: underline; font-family: 'Syne', sans-serif; }
  .admin-link:hover { color: #999; }
  .admin-panel { margin-top: 1rem; padding: 1.25rem; border: 1px solid #eee; border-radius: 12px; background: #fafafa; }
  .admin-panel h3 { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #aaa; margin-bottom: 1rem; }
  .admin-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .admin-row input { flex: 1; font-family: 'Syne', sans-serif; font-size: 13px; padding: 7px 10px; border: 1px solid #ddd; border-radius: 8px; color: #1a1a1a; outline: none; background: #fff; }
  .btn-small { font-family: 'Syne', sans-serif; font-size: 12px; padding: 7px 14px; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #1a1a1a; white-space: nowrap; transition: background 0.15s; }
  .btn-small:hover { background: #f5f5f5; }
  .btn-small.danger:hover { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
  .btn-small.success:hover { background: #EAF3DE; color: #3B6D11; border-color: #97C459; }
  .name-chip { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 8px; background: #fff; border: 1px solid #eee; font-size: 13px; margin-bottom: 6px; }
  .name-chip input { flex: 1; font-size: 13px; font-family: 'Syne', sans-serif; border: none; background: transparent; color: #1a1a1a; outline: none; }
  .msg { font-size: 12px; padding: 7px 12px; border-radius: 8px; margin-bottom: 8px; }
  .msg.error { background: #FCEBEB; color: #A32D2D; }
  .msg.success { background: #EAF3DE; color: #3B6D11; }
  .pw-gate { display: flex; gap: 8px; margin-bottom: 0; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Count of Shimajirou</h1>
    <div class="counter-display" id="counterDisplay">—</div>
    <div class="status-label">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusLabel">連線中...</span>
    </div>
  </div>

  <div class="selector-row">
    <label>操作者</label>
    <select id="nameSelect"></select>
  </div>

  <div class="btn-grid" id="btnGrid"></div>

  <div class="note-row">
    <label>備註</label>
    <input type="text" id="noteInput" placeholder="選填，說明增減原因..." maxlength="50">
  </div>

  <hr class="divider">

  <div class="log-section">
    <div class="log-title">最近紀錄</div>
    <div class="log-list" id="logList">
      <div class="empty-log">尚無紀錄</div>
    </div>
  </div>

  <hr class="divider">

  <div class="admin-toggle">
    <button class="admin-link" onclick="toggleAdminGate()">管理員設定</button>
  </div>

  <div id="adminGate" style="display:none; margin-top:1rem;">
    <div class="admin-panel">
      <div class="pw-gate">
        <input type="password" id="adminPwInput" placeholder="管理員密碼" style="flex:1; font-family:'Syne',sans-serif; font-size:13px; padding:7px 10px; border:1px solid #ddd; border-radius:8px; outline:none;">
        <button class="btn-small success" onclick="unlockAdmin()">進入</button>
      </div>
      <div id="adminMsg" style="margin-top:8px;"></div>
    </div>
  </div>

  <div id="adminPanel" style="display:none; margin-top:1rem;">
    <div class="admin-panel">
      <h3>名單管理</h3>
      <div id="nameChips"></div>
      <div class="admin-row">
        <input type="text" id="newNameInput" placeholder="新增名字..." maxlength="20">
        <button class="btn-small success" onclick="addName()">新增</button>
      </div>
      <div id="adminFeedback"></div>
      <hr class="divider" style="margin:1rem 0 0.75rem">
      <h3>修改管理員密碼</h3>
      <div class="admin-row">
        <input type="password" id="newPwInput" placeholder="新密碼（留空不更改）">
        <button class="btn-small" onclick="changePw()">更新密碼</button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBIBaL-AMxdsuLhgLY16jCyWQATuTEcrjY",
  authDomain: "count-of-shimajirou.firebaseapp.com",
  databaseURL: "https://count-of-shimajirou-default-rtdb.firebaseio.com",
  projectId: "count-of-shimajirou",
  storageBucket: "count-of-shimajirou.firebasestorage.app",
  messagingSenderId: "162925039758",
  appId: "1:162925039758:web:edf6173abcfe0ea21ff9df"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const DELTAS = [0.5, 1, 2, 3, 4, 5];
let names = ['孟霖', '涴琇'];
let adminPassword = 'admin1234';

function buildButtons() {
  const grid = document.getElementById('btnGrid');
  grid.innerHTML = '';
  DELTAS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'btn-plus';
    btn.textContent = '+' + d;
    btn.onclick = () => applyDelta(d);
    grid.appendChild(btn);
  });
  DELTAS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'btn-minus';
    btn.textContent = '-' + d;
    btn.onclick = () => applyDelta(-d);
    grid.appendChild(btn);
  });
}

function buildSelect() {
  const sel = document.getElementById('nameSelect');
  const prev = sel.value;
  sel.innerHTML = '';
  names.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n; opt.textContent = n;
    if (n === prev) opt.selected = true;
    sel.appendChild(opt);
  });
}

function applyDelta(delta) {
  const name = document.getElementById('nameSelect').value;
  const note = document.getElementById('noteInput').value.trim();
  if (!name) return;
  db.ref('counter').transaction(current => (current || 0) + delta);
  const entry = { name, delta, time: Date.now() };
  if (note) entry.note = note;
  db.ref('logs').push(entry);
  document.getElementById('noteInput').value = '';
  const disp = document.getElementById('counterDisplay');
  disp.classList.add('bump');
  setTimeout(() => disp.classList.remove('bump'), 150);
}

function formatTime(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  return pad(d.getMonth()+1) + '/' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function renderLogs(items) {
  const list = document.getElementById('logList');
  if (!items.length) {
    list.innerHTML = '<div class="empty-log">尚無紀錄</div>';
    return;
  }
  list.innerHTML = '';
  items.slice().reverse().forEach(item => {
    const row = document.createElement('div');
    row.className = 'log-item';
    const dStr = item.delta > 0 ? '+' + item.delta : String(item.delta);
    const cls = item.delta > 0 ? 'log-delta-pos' : 'log-delta-neg';
    row.innerHTML =
      '<span class="log-name">' + item.name + '</span>' +
      '<span class="' + cls + '">' + dStr + '</span>' +
      '<span class="log-note">' + (item.note || '') + '</span>' +
      '<span class="log-time">' + formatTime(item.time) + '</span>';
    list.appendChild(row);
  });
}

db.ref('.info/connected').on('value', snap => {
  const dot = document.getElementById('statusDot');
  const lbl = document.getElementById('statusLabel');
  if (snap.val()) {
    dot.className = 'status-dot';
    lbl.textContent = '即時同步中';
  } else {
    dot.className = 'status-dot offline';
    lbl.textContent = '連線中斷';
  }
});

db.ref('counter').on('value', snap => {
  const val = snap.val() ?? 0;
  document.getElementById('counterDisplay').textContent = Number.isInteger(val) ? val : val.toFixed(1);
});

db.ref('logs').limitToLast(20).on('value', snap => {
  const items = [];
  snap.forEach(child => items.push(child.val()));
  renderLogs(items);
});

db.ref('config').on('value', snap => {
  const cfg = snap.val();
  if (cfg && Array.isArray(cfg.names)) names = cfg.names;
  if (cfg && cfg.adminPassword) adminPassword = cfg.adminPassword;
  buildSelect();
});

function saveConfig() {
  db.ref('config').set({ names, adminPassword });
}

function toggleAdminGate() {
  const gate = document.getElementById('adminGate');
  gate.style.display = gate.style.display === 'none' ? 'block' : 'none';
  document.getElementById('adminPanel').style.display = 'none';
}

function unlockAdmin() {
  const pw = document.getElementById('adminPwInput').value;
  const msg = document.getElementById('adminMsg');
  if (pw === adminPassword) {
    document.getElementById('adminGate').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    renderChips();
  } else {
    msg.innerHTML = '<div class="msg error">密碼錯誤</div>';
    setTimeout(() => msg.innerHTML = '', 2000);
  }
}

function renderChips() {
  const c = document.getElementById('nameChips');
  c.innerHTML = '';
  names.forEach((n, i) => {
    const chip = document.createElement('div');
    chip.className = 'name-chip';
    chip.innerHTML =
      '<input type="text" value="' + n + '" data-idx="' + i + '" onchange="editName(this)">' +
      '<button class="btn-small danger" onclick="deleteName(' + i + ')">刪除</button>';
    c.appendChild(chip);
  });
}

function editName(input) {
  names[parseInt(input.dataset.idx)] = input.value.trim();
  buildSelect(); saveConfig();
}

function deleteName(idx) {
  names.splice(idx, 1);
  renderChips(); buildSelect(); saveConfig();
}

function addName() {
  const inp = document.getElementById('newNameInput');
  const val = inp.value.trim();
  const fb = document.getElementById('adminFeedback');
  if (!val) return;
  if (names.includes(val)) {
    fb.innerHTML = '<div class="msg error">名字已存在</div>';
    setTimeout(() => fb.innerHTML = '', 2000);
    return;
  }
  names.push(val); inp.value = '';
  renderChips(); buildSelect(); saveConfig();
  fb.innerHTML = '<div class="msg success">已新增</div>';
  setTimeout(() => fb.innerHTML = '', 2000);
}

function changePw() {
  const newPw = document.getElementById('newPwInput').value.trim();
  const fb = document.getElementById('adminFeedback');
  if (!newPw) return;
  adminPassword = newPw; saveConfig();
  document.getElementById('newPwInput').value = '';
  fb.innerHTML = '<div class="msg success">密碼已更新</div>';
  setTimeout(() => fb.innerHTML = '', 2000);
}

buildButtons();
buildSelect();
</script>
</body>
</html>
